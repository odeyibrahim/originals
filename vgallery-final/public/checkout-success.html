<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - V. Gallery</title>
    <link href="https://fonts.cdnfonts.com/css/copperplate" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Copperplate', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8f8f8;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 4px;
            max-width: 500px;
        }
        .checkmark { font-size: 64px; color: #2e7d32; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #000;
            color: white;
            text-decoration: none;
            font-family: inherit;
        }
        .btn:hover { background: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>
        <h1>Payment Successful!</h1>
        <p>Thank you for your order. You will receive a confirmation email shortly with your order details.</p>
        <a href="/" class="btn">Continue Shopping</a>
    </div>
    <script>
        localStorage.removeItem('admin_token');
    </script>
</body>
</html>
